name: matchmalawi
description: Match Malawi - Malawi's #1 Dating App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.8.1
  firebase_auth: ^5.4.1
  cloud_firestore: ^5.6.1
  firebase_storage: ^12.4.1
  firebase_messaging: ^15.2.1

  # State Management
  provider: ^6.1.2

  # UI
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.16
  shimmer: ^3.0.0
  flutter_staggered_animations: ^1.1.1
  card_swiper: ^3.0.1
  photo_view: ^0.15.0
  image_picker: ^1.1.2

  # Maps
  google_maps_flutter: ^2.10.1
  geolocator: ^13.0.1
  geocoding: ^3.0.0

  # Utils
  intl: ^0.19.0
  timeago: ^3.7.0
  uuid: ^4.5.1
  url_launcher: ^6.3.1
  shared_preferences: ^2.3.3
  connectivity_plus: ^6.1.2
  permission_handler: ^11.3.1
  flutter_local_notifications: ^18.0.1
  path_provider: ^2.1.5

  # Auth
  google_sign_in: ^6.2.2

  # Local Auth
  local_auth: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
