services:
  - type: web
    name: utande-billing
    runtime: node
    plan: free
    buildCommand: ./build.sh
    startCommand: cd backend && node dist/index.js
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        value: bwailacesc@gmail.com
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        value: "Utande Billing <bwailacesc@gmail.com>"
      - key: APP_URL
        value: https://utande-billing.onrender.com
