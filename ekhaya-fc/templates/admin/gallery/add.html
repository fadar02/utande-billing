{% extends "admin/base_admin.html" %}

{% block title %}Add Gallery Item - Ekhaya FC{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="mb-0">Add Gallery Item</h4>
    <a href="{{ url_for('gallery.list_gallery') }}" class="btn btn-outline-secondary">
        <i class="bi bi-arrow-left me-1"></i>Back to Gallery
    </a>
</div>

<div class="card border-0 shadow-sm">
    <div class="card-body">
        <form action="{{ url_for('gallery.add_item') }}" method="POST" enctype="multipart/form-data">
            <div class="row g-3">
                <div class="col-md-6">
                    <label for="title" class="form-label">Title <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="title" name="title" required>
                </div>
                <div class="col-md-6">
                    <label for="media_type" class="form-label">Media Type <span class="text-danger">*</span></label>
                    <select class="form-select" id="media_type" name="media_type" required>
                        <option value="">Select Type</option>
                        <option value="photo">Photo</option>
                        <option value="video">Video</option>
                    </select>
                </div>
                <div class="col-12">
                    <label for="caption" class="form-label">Caption</label>
                    <textarea class="form-control" id="caption" name="caption" rows="3"></textarea>
                </div>
                <div class="col-md-6">
                    <label for="file_path" class="form-label">File <span class="text-danger">*</span></label>
                    <input type="file" class="form-control" id="file_path" name="file_path" required>
                </div>
                <div class="col-md-6">
                    <label for="category" class="form-label">Category <span class="text-danger">*</span></label>
                    <select class="form-select" id="category" name="category" required>
                        <option value="">Select Category</option>
                        <option value="match">Match</option>
                        <option value="training">Training</option>
                        <option value="event">Event</option>
                    </select>
                </div>
            </div>
            <div class="mt-4">
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-check-lg me-1"></i>Add Item
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
