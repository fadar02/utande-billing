{% extends "admin/base_admin.html" %}

{% block title %}Edit Player - Ekhaya FC{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="mb-0">Edit Player</h4>
    <a href="{{ url_for('players.list_players') }}" class="btn btn-outline-secondary">
        <i class="bi bi-arrow-left me-1"></i>Back to Players
    </a>
</div>

<div class="card border-0 shadow-sm">
    <div class="card-body">
        <form action="{{ url_for('players.edit_player', id=player.id) }}" method="POST" enctype="multipart/form-data">
            <h6 class="text-primary fw-bold mb-3"><i class="bi bi-person me-2"></i>Personal Details</h6>
            <div class="row g-3 mb-4">
                <div class="col-md-6">
                    <label for="photo" class="form-label">Player Photo</label>
                    {% if player.photo %}
                    <div class="mb-2">
                        <img src="{{ url_for('static', filename='uploads/players/' + player.photo) }}" alt="{{ player.full_name }}" class="rounded" height="80">
                    </div>
                    {% endif %}
                    <input type="file" class="form-control" id="photo" name="photo" accept="image/*">
                </div>
                <div class="col-md-6">
                    <label for="full_name" class="form-label">Full Name <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="full_name" name="full_name" value="{{ player.full_name }}" required>
                </div>
                <div class="col-md-3">
                    <label for="jersey_number" class="form-label">Jersey Number <span class="text-danger">*</span></label>
                    <input type="number" class="form-control" id="jersey_number" name="jersey_number" value="{{ player.jersey_number }}" min="0" max="99" required>
                </div>
                <div class="col-md-3">
                    <label for="position" class="form-label">Position <span class="text-danger">*</span></label>
                    <select class="form-select" id="position" name="position" required>
                        <option value="">Select Position</option>
                        <option value="Goalkeeper" {% if player.position == 'Goalkeeper' %}selected{% endif %}>Goalkeeper</option>
                        <option value="Defender" {% if player.position == 'Defender' %}selected{% endif %}>Defender</option>
                        <option value="Midfielder" {% if player.position == 'Midfielder' %}selected{% endif %}>Midfielder</option>
                        <option value="Forward" {% if player.position == 'Forward' %}selected{% endif %}>Forward</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label for="date_of_birth" class="form-label">Date of Birth</label>
                    <input type="date" class="form-control" id="date_of_birth" name="date_of_birth" value="{{ player.date_of_birth.strftime('%Y-%m-%d') if player.date_of_birth else '' }}">
                </div>
                <div class="col-md-3">
                    <label for="nationality" class="form-label">Nationality</label>
                    <input type="text" class="form-control" id="nationality" name="nationality" value="{{ player.nationality or '' }}">
                </div>
                <div class="col-md-3">
                    <label for="height" class="form-label">Height (cm)</label>
                    <input type="number" class="form-control" id="height" name="height" value="{{ player.height or '' }}" step="0.1">
                </div>
                <div class="col-md-3">
                    <label for="weight" class="form-label">Weight (kg)</label>
                    <input type="number" class="form-control" id="weight" name="weight" value="{{ player.weight or '' }}" step="0.1">
                </div>
                <div class="col-md-3">
                    <label for="preferred_foot" class="form-label">Preferred Foot</label>
                    <select class="form-select" id="preferred_foot" name="preferred_foot">
                        <option value="">Select</option>
                        <option value="Right" {% if player.preferred_foot == 'Right' %}selected{% endif %}>Right</option>
                        <option value="Left" {% if player.preferred_foot == 'Left' %}selected{% endif %}>Left</option>
                        <option value="Both" {% if player.preferred_foot == 'Both' %}selected{% endif %}>Both</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label for="phone" class="form-label">Phone</label>
                    <input type="text" class="form-control" id="phone" name="phone" value="{{ player.phone or '' }}">
                </div>
                <div class="col-md-3">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" class="form-control" id="email" name="email" value="{{ player.email or '' }}">
                </div>
                <div class="col-md-6">
                    <label for="emergency_contact" class="form-label">Emergency Contact</label>
                    <input type="text" class="form-control" id="emergency_contact" name="emergency_contact" value="{{ player.emergency_contact or '' }}" placeholder="Name & Phone Number">
                </div>
                <div class="col-md-6">
                    <label for="status" class="form-label">Status <span class="text-danger">*</span></label>
                    <select class="form-select" id="status" name="status" required>
                        <option value="active" {% if player.status.value == 'active' %}selected{% endif %}>Active</option>
                        <option value="injured" {% if player.status.value == 'injured' %}selected{% endif %}>Injured</option>
                        <option value="suspended" {% if player.status.value == 'suspended' %}selected{% endif %}>Suspended</option>
                        <option value="inactive" {% if player.status.value == 'inactive' %}selected{% endif %}>Inactive</option>
                    </select>
                </div>
            </div>

            <h6 class="text-primary fw-bold mb-3"><i class="bi bi-bar-chart me-2"></i>Football Statistics</h6>
            <div class="row g-3">
                <div class="col-md-2">
                    <label for="appearances" class="form-label">Appearances</label>
                    <input type="number" class="form-control" id="appearances" name="appearances" value="{{ player.appearances }}" min="0">
                </div>
                <div class="col-md-2">
                    <label for="goals" class="form-label">Goals</label>
                    <input type="number" class="form-control" id="goals" name="goals" value="{{ player.goals }}" min="0">
                </div>
                <div class="col-md-2">
                    <label for="assists" class="form-label">Assists</label>
                    <input type="number" class="form-control" id="assists" name="assists" value="{{ player.assists }}" min="0">
                </div>
                <div class="col-md-2">
                    <label for="yellow_cards" class="form-label">Yellow Cards</label>
                    <input type="number" class="form-control" id="yellow_cards" name="yellow_cards" value="{{ player.yellow_cards }}" min="0">
                </div>
                <div class="col-md-2">
                    <label for="red_cards" class="form-label">Red Cards</label>
                    <input type="number" class="form-control" id="red_cards" name="red_cards" value="{{ player.red_cards }}" min="0">
                </div>
                <div class="col-md-2">
                    <label for="minutes_played" class="form-label">Minutes Played</label>
                    <input type="number" class="form-control" id="minutes_played" name="minutes_played" value="{{ player.minutes_played }}" min="0">
                </div>
            </div>

            <div class="mt-4">
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-check-lg me-1"></i>Update Player
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
