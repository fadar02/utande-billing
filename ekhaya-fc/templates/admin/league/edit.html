{% extends "admin/base_admin.html" %}

{% block title %}Edit League Entry - Ekhaya FC{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="mb-0">Edit League Entry</h4>
    <a href="{{ url_for('league.list_league') }}" class="btn btn-outline-secondary">
        <i class="bi bi-arrow-left me-1"></i>Back to League Table
    </a>
</div>

<div class="card border-0 shadow-sm">
    <div class="card-body">
        <form action="{{ url_for('league.edit_entry', id=entry.id) }}" method="POST">
            <div class="row g-3">
                <div class="col-md-6">
                    <label for="club_name" class="form-label">Club Name <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="club_name" name="club_name" value="{{ entry.club_name }}" required>
                </div>
                <div class="col-md-6">
                    <label for="season" class="form-label">Season <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="season" name="season" value="{{ entry.season }}" required>
                </div>
                <div class="col-md-3">
                    <label for="position" class="form-label">Position <span class="text-danger">*</span></label>
                    <input type="number" class="form-control" id="position" name="position" value="{{ entry.position }}" min="1" required>
                </div>
                <div class="col-md-3">
                    <label for="played" class="form-label">Played</label>
                    <input type="number" class="form-control" id="played" name="played" value="{{ entry.played }}" min="0">
                </div>
                <div class="col-md-2">
                    <label for="wins" class="form-label">Wins</label>
                    <input type="number" class="form-control" id="wins" name="wins" value="{{ entry.wins }}" min="0">
                </div>
                <div class="col-md-2">
                    <label for="draws" class="form-label">Draws</label>
                    <input type="number" class="form-control" id="draws" name="draws" value="{{ entry.draws }}" min="0">
                </div>
                <div class="col-md-2">
                    <label for="losses" class="form-label">Losses</label>
                    <input type="number" class="form-control" id="losses" name="losses" value="{{ entry.losses }}" min="0">
                </div>
                <div class="col-md-3">
                    <label for="goals_for" class="form-label">Goals For</label>
                    <input type="number" class="form-control" id="goals_for" name="goals_for" value="{{ entry.goals_for }}" min="0">
                </div>
                <div class="col-md-3">
                    <label for="goals_against" class="form-label">Goals Against</label>
                    <input type="number" class="form-control" id="goals_against" name="goals_against" value="{{ entry.goals_against }}" min="0">
                </div>
            </div>
            <div class="mt-4">
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-check-lg me-1"></i>Update Entry
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
