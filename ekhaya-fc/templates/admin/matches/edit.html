{% extends "admin/base_admin.html" %}

{% block title %}Edit Match - Ekhaya FC{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="mb-0">Edit Match</h4>
    <a href="{{ url_for('matches.list_matches') }}" class="btn btn-outline-secondary">
        <i class="bi bi-arrow-left me-1"></i>Back to Matches
    </a>
</div>

<div class="card border-0 shadow-sm">
    <div class="card-body">
        <form action="{{ url_for('matches.edit_match', id=match.id) }}" method="POST">
            <div class="row g-3">
                <div class="col-md-6">
                    <label for="opponent" class="form-label">Opponent <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="opponent" name="opponent" value="{{ match.opponent }}" required>
                </div>
                <div class="col-md-6">
                    <label for="competition" class="form-label">Competition <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="competition" name="competition" value="{{ match.competition }}" required>
                </div>
                <div class="col-md-4">
                    <label for="match_date" class="form-label">Match Date <span class="text-danger">*</span></label>
                    <input type="date" class="form-control" id="match_date" name="match_date" value="{{ match.match_date.strftime('%Y-%m-%d') }}" required>
                </div>
                <div class="col-md-4">
                    <label for="kick_off_time" class="form-label">Kick-off Time</label>
                    <input type="time" class="form-control" id="kick_off_time" name="kick_off_time" value="{{ match.kick_off_time.strftime('%H:%M') if match.kick_off_time else '' }}">
                </div>
                <div class="col-md-4">
                    <label for="venue" class="form-label">Venue</label>
                    <input type="text" class="form-control" id="venue" name="venue" value="{{ match.venue or '' }}">
                </div>
                <div class="col-md-4">
                    <label for="home_away" class="form-label">Home/Away <span class="text-danger">*</span></label>
                    <select class="form-select" id="home_away" name="home_away" required>
                        <option value="">Select</option>
                        <option value="home" {% if match.home_away.value == 'home' %}selected{% endif %}>Home</option>
                        <option value="away" {% if match.home_away.value == 'away' %}selected{% endif %}>Away</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label for="status" class="form-label">Status</label>
                    <select class="form-select" id="status" name="status">
                        <option value="scheduled" {% if match.status.value == 'scheduled' %}selected{% endif %}>Scheduled</option>
                        <option value="live" {% if match.status.value == 'live' %}selected{% endif %}>Live</option>
                        <option value="completed" {% if match.status.value == 'completed' %}selected{% endif %}>Completed</option>
                        <option value="cancelled" {% if match.status.value == 'cancelled' %}selected{% endif %}>Cancelled</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label for="match_officials" class="form-label">Match Officials</label>
                    <input type="text" class="form-control" id="match_officials" name="match_officials" value="{{ match.match_officials or '' }}">
                </div>
                <div class="col-12">
                    <label for="match_report" class="form-label">Match Report</label>
                    <textarea class="form-control" id="match_report" name="match_report" rows="4">{{ match.match_report or '' }}</textarea>
                </div>
            </div>
            <div class="mt-4">
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-check-lg me-1"></i>Update Match
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
