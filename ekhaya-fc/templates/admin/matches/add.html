{% extends "admin/base_admin.html" %}

{% block title %}Add Match - Ekhaya FC{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="mb-0">Add Match</h4>
    <a href="{{ url_for('matches.list_matches') }}" class="btn btn-outline-secondary">
        <i class="bi bi-arrow-left me-1"></i>Back to Matches
    </a>
</div>

<div class="card border-0 shadow-sm">
    <div class="card-body">
        <form action="{{ url_for('matches.add_match') }}" method="POST">
            <div class="row g-3">
                <div class="col-md-6">
                    <label for="opponent" class="form-label">Opponent <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="opponent" name="opponent" required>
                </div>
                <div class="col-md-6">
                    <label for="competition" class="form-label">Competition <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="competition" name="competition" required>
                </div>
                <div class="col-md-4">
                    <label for="match_date" class="form-label">Match Date <span class="text-danger">*</span></label>
                    <input type="date" class="form-control" id="match_date" name="match_date" required>
                </div>
                <div class="col-md-4">
                    <label for="kick_off_time" class="form-label">Kick-off Time</label>
                    <input type="time" class="form-control" id="kick_off_time" name="kick_off_time">
                </div>
                <div class="col-md-4">
                    <label for="venue" class="form-label">Venue</label>
                    <input type="text" class="form-control" id="venue" name="venue">
                </div>
                <div class="col-md-4">
                    <label for="home_away" class="form-label">Home/Away <span class="text-danger">*</span></label>
                    <select class="form-select" id="home_away" name="home_away" required>
                        <option value="">Select</option>
                        <option value="home">Home</option>
                        <option value="away">Away</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label for="status" class="form-label">Status</label>
                    <select class="form-select" id="status" name="status">
                        <option value="scheduled">Scheduled</option>
                        <option value="live">Live</option>
                        <option value="completed">Completed</option>
                        <option value="cancelled">Cancelled</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label for="match_officials" class="form-label">Match Officials</label>
                    <input type="text" class="form-control" id="match_officials" name="match_officials">
                </div>
                <div class="col-12">
                    <label for="match_report" class="form-label">Match Report</label>
                    <textarea class="form-control" id="match_report" name="match_report" rows="4"></textarea>
                </div>
            </div>
            <div class="mt-4">
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-check-lg me-1"></i>Add Match
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
