{% extends "admin/base_admin.html" %}

{% block title %}Edit Product - Ekhaya FC{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="mb-0">Edit Product</h4>
    <a href="{{ url_for('merchandise.list_products') }}" class="btn btn-outline-secondary">
        <i class="bi bi-arrow-left me-1"></i>Back to Merchandise
    </a>
</div>

<div class="card border-0 shadow-sm">
    <div class="card-body">
        <form action="{{ url_for('merchandise.edit_product', id=product.id) }}" method="POST" enctype="multipart/form-data">
            <div class="row g-3">
                <div class="col-md-6">
                    <label for="image" class="form-label">Image</label>
                    {% if product.image %}
                    <div class="mb-2">
                        <img src="{{ url_for('static', filename='uploads/products/' + product.image) }}" alt="{{ product.name }}" class="rounded" height="80">
                    </div>
                    {% endif %}
                    <input type="file" class="form-control" id="image" name="image" accept="image/*">
                </div>
                <div class="col-md-6">
                    <label for="name" class="form-label">Name <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="name" name="name" value="{{ product.name }}" required>
                </div>
                <div class="col-12">
                    <label for="description" class="form-label">Description</label>
                    <textarea class="form-control" id="description" name="description" rows="4">{{ product.description or '' }}</textarea>
                </div>
                <div class="col-md-4">
                    <label for="category" class="form-label">Category <span class="text-danger">*</span></label>
                    <select class="form-select" id="category" name="category" required>
                        <option value="">Select Category</option>
                        <option value="jersey" {% if product.category.value == 'jersey' %}selected{% endif %}>Jersey</option>
                        <option value="tshirt" {% if product.category.value == 'tshirt' %}selected{% endif %}>T-Shirt</option>
                        <option value="cap" {% if product.category.value == 'cap' %}selected{% endif %}>Cap</option>
                        <option value="scarf" {% if product.category.value == 'scarf' %}selected{% endif %}>Scarf</option>
                        <option value="ticket" {% if product.category.value == 'ticket' %}selected{% endif %}>Ticket</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label for="price" class="form-label">Price <span class="text-danger">*</span></label>
                    <input type="number" class="form-control" id="price" name="price" value="{{ product.price }}" step="0.01" min="0" required>
                </div>
                <div class="col-md-4">
                    <label for="stock_quantity" class="form-label">Stock Quantity</label>
                    <input type="number" class="form-control" id="stock_quantity" name="stock_quantity" value="{{ product.stock_quantity }}" min="0">
                </div>
                <div class="col-md-6">
                    <div class="form-check mt-2">
                        <input class="form-check-input" type="checkbox" id="is_active" name="is_active" {% if product.is_active %}checked{% endif %}>
                        <label class="form-check-label" for="is_active">Is Active</label>
                    </div>
                </div>
            </div>
            <div class="mt-4">
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-check-lg me-1"></i>Update Product
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
