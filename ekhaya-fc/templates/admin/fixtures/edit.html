{% extends "admin/base_admin.html" %}

{% block title %}Edit Fixture - Ekhaya FC{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="mb-0">Edit Fixture</h4>
    <a href="{{ url_for('fixtures.list_fixtures') }}" class="btn btn-outline-secondary">
        <i class="bi bi-arrow-left me-1"></i>Back to Fixtures
    </a>
</div>

<div class="card border-0 shadow-sm">
    <div class="card-body">
        <form action="{{ url_for('fixtures.edit_fixture', id=fixture.id) }}" method="POST">
            <div class="row g-3">
                <div class="col-md-6">
                    <label for="match_id" class="form-label">Match <span class="text-danger">*</span></label>
                    <select class="form-select" id="match_id" name="match_id" required>
                        <option value="">Select Match</option>
                        {% for m in matches %}
                        <option value="{{ m.id }}" {% if fixture.match_id == m.id %}selected{% endif %}>{{ m.opponent }} - {{ m.match_date.strftime('%b %d, %Y') }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-6">
                    <label for="competition" class="form-label">Competition <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="competition" name="competition" value="{{ fixture.competition }}" required>
                </div>
                <div class="col-md-4">
                    <label for="match_date" class="form-label">Match Date <span class="text-danger">*</span></label>
                    <input type="date" class="form-control" id="match_date" name="match_date" value="{{ fixture.match_date.strftime('%Y-%m-%d') }}" required>
                </div>
                <div class="col-md-4">
                    <label for="kick_off_time" class="form-label">Kick-off Time</label>
                    <input type="time" class="form-control" id="kick_off_time" name="kick_off_time" value="{{ fixture.kick_off_time.strftime('%H:%M') if fixture.kick_off_time else '' }}">
                </div>
                <div class="col-md-4">
                    <label for="venue" class="form-label">Venue</label>
                    <input type="text" class="form-control" id="venue" name="venue" value="{{ fixture.venue or '' }}">
                </div>
                <div class="col-md-4">
                    <label for="home_away" class="form-label">Home/Away <span class="text-danger">*</span></label>
                    <select class="form-select" id="home_away" name="home_away" required>
                        <option value="">Select</option>
                        <option value="home" {% if fixture.home_away|lower == 'home' %}selected{% endif %}>Home</option>
                        <option value="away" {% if fixture.home_away|lower == 'away' %}selected{% endif %}>Away</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label for="opponent" class="form-label">Opponent <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="opponent" name="opponent" value="{{ fixture.opponent }}" required>
                </div>
                <div class="col-md-4">
                    <label for="match_status" class="form-label">Match Status</label>
                    <select class="form-select" id="match_status" name="match_status">
                        <option value="upcoming" {% if fixture.match_status.value == 'upcoming' %}selected{% endif %}>Upcoming</option>
                        <option value="in_progress" {% if fixture.match_status.value == 'in_progress' %}selected{% endif %}>In Progress</option>
                        <option value="completed" {% if fixture.match_status.value == 'completed' %}selected{% endif %}>Completed</option>
                        <option value="cancelled" {% if fixture.match_status.value == 'cancelled' %}selected{% endif %}>Cancelled</option>
                    </select>
                </div>
            </div>
            <div class="mt-4">
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-check-lg me-1"></i>Update Fixture
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
