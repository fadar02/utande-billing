{% extends "admin/base_admin.html" %}

{% block title %}Add Fixture - Ekhaya FC{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="mb-0">Add Fixture</h4>
    <a href="{{ url_for('fixtures.list_fixtures') }}" class="btn btn-outline-secondary">
        <i class="bi bi-arrow-left me-1"></i>Back to Fixtures
    </a>
</div>

<div class="card border-0 shadow-sm">
    <div class="card-body">
        <form action="{{ url_for('fixtures.add_fixture') }}" method="POST">
            <div class="row g-3">
                <div class="col-md-6">
                    <label for="match_id" class="form-label">Match <span class="text-danger">*</span></label>
                    <select class="form-select" id="match_id" name="match_id" required>
                        <option value="">Select Match</option>
                        {% for m in matches %}
                        <option value="{{ m.id }}">{{ m.opponent }} - {{ m.match_date.strftime('%b %d, %Y') }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-6">
                    <label for="competition" class="form-label">Competition <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="competition" name="competition" required>
                </div>
                <div class="col-md-4">
                    <label for="match_date" class="form-label">Match Date <span class="text-danger">*</span></label>
                    <input type="date" class="form-control" id="match_date" name="match_date" required>
                </div>
                <div class="col-md-4">
                    <label for="kick_off_time" class="form-label">Kick-off Time</label>
                    <input type="time" class="form-control" id="kick_off_time" name="kick_off_time">
                </div>
                <div class="col-md-4">
                    <label for="venue" class="form-label">Venue</label>
                    <input type="text" class="form-control" id="venue" name="venue">
                </div>
                <div class="col-md-4">
                    <label for="home_away" class="form-label">Home/Away <span class="text-danger">*</span></label>
                    <select class="form-select" id="home_away" name="home_away" required>
                        <option value="">Select</option>
                        <option value="home">Home</option>
                        <option value="away">Away</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label for="opponent" class="form-label">Opponent <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="opponent" name="opponent" required>
                </div>
                <div class="col-md-4">
                    <label for="match_status" class="form-label">Match Status</label>
                    <select class="form-select" id="match_status" name="match_status">
                        <option value="upcoming">Upcoming</option>
                        <option value="in_progress">In Progress</option>
                        <option value="completed">Completed</option>
                        <option value="cancelled">Cancelled</option>
                    </select>
                </div>
            </div>
            <div class="mt-4">
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-check-lg me-1"></i>Add Fixture
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
