{% extends "admin/base_admin.html" %}

{% block title %}Edit Video - Admin{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="fw-bold mb-0"><i class="bi bi-play-circle me-2"></i>Edit Video</h2>
    <a href="{{ url_for('admin_videos.list_videos') }}" class="btn btn-outline-secondary">
        <i class="bi bi-arrow-left me-1"></i>Back to Videos
    </a>
</div>

<div class="card shadow-sm">
    <div class="card-body">
        <form method="POST">
            <div class="mb-3">
                <label for="title" class="form-label">Title <span class="text-danger">*</span></label>
                <input type="text" class="form-control" id="title" name="title" value="{{ video.title }}" required>
            </div>

            <div class="mb-3">
                <label for="video_url" class="form-label">Video URL <span class="text-danger">*</span></label>
                <input type="url" class="form-control" id="video_url" name="video_url" value="{{ video.video_url }}" required>
                <small class="text-muted">Paste a YouTube or Facebook video URL. It will be embedded automatically.</small>
            </div>

            <div class="mb-3">
                <label for="category" class="form-label">Category</label>
                <select class="form-select" id="category" name="category">
                    <option value="match_highlight" {% if video.category == 'match_highlight' %}selected{% endif %}>Match Highlight</option>
                    <option value="interview" {% if video.category == 'interview' %}selected{% endif %}>Interview</option>
                    <option value="training" {% if video.category == 'training' %}selected{% endif %}>Training</option>
                    <option value="behind_scenes" {% if video.category == 'behind_scenes' %}selected{% endif %}>Behind the Scenes</option>
                    <option value="press_conference" {% if video.category == 'press_conference' %}selected{% endif %}>Press Conference</option>
                    <option value="other" {% if video.category == 'other' %}selected{% endif %}>Other</option>
                </select>
            </div>

            <div class="mb-3">
                <label for="description" class="form-label">Description</label>
                <textarea class="form-control" id="description" name="description" rows="4">{{ video.description or '' }}</textarea>
            </div>

            <div class="mb-3 form-check">
                <input type="checkbox" class="form-check-input" id="is_published" name="is_published" value="1" {% if video.is_published %}checked{% endif %}>
                <label class="form-check-label" for="is_published">Published</label>
            </div>

            <button type="submit" class="btn btn-primary">
                <i class="bi bi-check-lg me-1"></i>Update Video
            </button>
        </form>
    </div>
</div>
{% endblock %}
