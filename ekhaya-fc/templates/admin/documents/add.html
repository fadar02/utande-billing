{% extends "admin/base_admin.html" %}

{% block title %}Upload Document - Ekhaya FC{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="mb-0">Upload Document</h4>
    <a href="{{ url_for('documents.list_documents') }}" class="btn btn-outline-secondary">
        <i class="bi bi-arrow-left me-1"></i>Back to Documents
    </a>
</div>

<div class="card border-0 shadow-sm">
    <div class="card-body">
        <form action="{{ url_for('documents.add_document') }}" method="POST" enctype="multipart/form-data">
            <div class="row g-3">
                <div class="col-md-8">
                    <label for="title" class="form-label">Title <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="title" name="title" required>
                </div>
                <div class="col-md-4">
                    <label for="category" class="form-label">Category <span class="text-danger">*</span></label>
                    <select class="form-select" id="category" name="category" required>
                        <option value="player_registration">Player Registration</option>
                        <option value="club_document">Club Document</option>
                        <option value="team_sheet">Team Sheet</option>
                        <option value="match_report">Match Report</option>
                        <option value="other" selected>Other</option>
                    </select>
                </div>
                <div class="col-12">
                    <label for="description" class="form-label">Description</label>
                    <textarea class="form-control" id="description" name="description" rows="3"></textarea>
                </div>
                <div class="col-md-6">
                    <label for="file" class="form-label">File <span class="text-danger">*</span></label>
                    <input type="file" class="form-control" id="file" name="file" required>
                    <div class="form-text">Supported formats: PDF, DOC, DOCX, XLS, XLSX, JPG, PNG</div>
                </div>
                <div class="col-md-6">
                    <label for="uploaded_by" class="form-label">Uploaded By</label>
                    <input type="text" class="form-control" id="uploaded_by" name="uploaded_by" value="Admin">
                </div>
            </div>
            <div class="mt-4">
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-upload me-1"></i>Upload Document
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
