{% extends "admin/base_admin.html" %}

{% block title %}Edit Document - Ekhaya FC{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="mb-0">Edit Document</h4>
    <a href="{{ url_for('documents.list_documents') }}" class="btn btn-outline-secondary">
        <i class="bi bi-arrow-left me-1"></i>Back to Documents
    </a>
</div>

<div class="card border-0 shadow-sm">
    <div class="card-body">
        <form action="{{ url_for('documents.edit_document', id=document.id) }}" method="POST" enctype="multipart/form-data">
            <div class="row g-3">
                <div class="col-md-8">
                    <label for="title" class="form-label">Title <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="title" name="title" value="{{ document.title }}" required>
                </div>
                <div class="col-md-4">
                    <label for="category" class="form-label">Category <span class="text-danger">*</span></label>
                    <select class="form-select" id="category" name="category" required>
                        <option value="player_registration" {% if document.category.value == 'player_registration' %}selected{% endif %}>Player Registration</option>
                        <option value="club_document" {% if document.category.value == 'club_document' %}selected{% endif %}>Club Document</option>
                        <option value="team_sheet" {% if document.category.value == 'team_sheet' %}selected{% endif %}>Team Sheet</option>
                        <option value="match_report" {% if document.category.value == 'match_report' %}selected{% endif %}>Match Report</option>
                        <option value="other" {% if document.category.value == 'other' %}selected{% endif %}>Other</option>
                    </select>
                </div>
                <div class="col-12">
                    <label for="description" class="form-label">Description</label>
                    <textarea class="form-control" id="description" name="description" rows="3">{{ document.description or '' }}</textarea>
                </div>
                <div class="col-md-6">
                    <label for="file" class="form-label">Replace File (optional)</label>
                    {% if document.file_path %}
                    <div class="mb-2">
                        <a href="{{ url_for('documents.download_document', id=document.id) }}" class="text-decoration-none">
                            <i class="bi bi-file-earmark me-1"></i>{{ document.title }}.{{ document.file_type|lower if document.file_type else 'file' }}
                        </a>
                    </div>
                    {% endif %}
                    <input type="file" class="form-control" id="file" name="file">
                </div>
            </div>
            <div class="mt-4">
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-check-lg me-1"></i>Update Document
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
