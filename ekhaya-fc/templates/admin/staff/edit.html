{% extends "admin/base_admin.html" %}

{% block title %}Edit Staff - Ekhaya FC{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="mb-0">Edit Staff Member</h4>
    <a href="{{ url_for('staff.list_staff') }}" class="btn btn-outline-secondary">
        <i class="bi bi-arrow-left me-1"></i>Back to Staff
    </a>
</div>

<div class="card border-0 shadow-sm">
    <div class="card-body">
        <form action="{{ url_for('staff.edit_staff', id=staff.id) }}" method="POST" enctype="multipart/form-data">
            <div class="row g-3">
                <div class="col-md-6">
                    <label for="photo" class="form-label">Photo</label>
                    {% if staff.photo %}
                    <div class="mb-2">
                        <img src="{{ url_for('static', filename='uploads/staff/' + staff.photo) }}" alt="{{ staff.full_name }}" class="rounded" height="80">
                    </div>
                    {% endif %}
                    <input type="file" class="form-control" id="photo" name="photo" accept="image/*">
                </div>
                <div class="col-md-6">
                    <label for="full_name" class="form-label">Full Name <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="full_name" name="full_name" value="{{ staff.full_name }}" required>
                </div>
                <div class="col-md-6">
                    <label for="role" class="form-label">Role <span class="text-danger">*</span></label>
                    <select class="form-select" id="role" name="role" required>
                        <option value="">Select Role</option>
                        <option value="head_coach" {% if staff.role.value == 'head_coach' %}selected{% endif %}>Head Coach</option>
                        <option value="assistant_coach" {% if staff.role.value == 'assistant_coach' %}selected{% endif %}>Assistant Coach</option>
                        <option value="goalkeeper_coach" {% if staff.role.value == 'goalkeeper_coach' %}selected{% endif %}>Goalkeeper Coach</option>
                        <option value="fitness_coach" {% if staff.role.value == 'fitness_coach' %}selected{% endif %}>Fitness Coach</option>
                        <option value="team_doctor" {% if staff.role.value == 'team_doctor' %}selected{% endif %}>Team Doctor</option>
                        <option value="physio" {% if staff.role.value == 'physio' %}selected{% endif %}>Physio</option>
                        <option value="kit_manager" {% if staff.role.value == 'kit_manager' %}selected{% endif %}>Kit Manager</option>
                        <option value="club_secretary" {% if staff.role.value == 'club_secretary' %}selected{% endif %}>Club Secretary</option>
                        <option value="media_officer" {% if staff.role.value == 'media_officer' %}selected{% endif %}>Media Officer</option>
                    </select>
                </div>
                <div class="col-md-6">
                    <label for="phone" class="form-label">Phone</label>
                    <input type="text" class="form-control" id="phone" name="phone" value="{{ staff.phone or '' }}">
                </div>
                <div class="col-md-6">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" class="form-control" id="email" name="email" value="{{ staff.email or '' }}">
                </div>
                <div class="col-12">
                    <label for="bio" class="form-label">Bio</label>
                    <textarea class="form-control" id="bio" name="bio" rows="4">{{ staff.bio or '' }}</textarea>
                </div>
            </div>
            <div class="mt-4">
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-check-lg me-1"></i>Update Staff
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
