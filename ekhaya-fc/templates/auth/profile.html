{% extends "base.html" %}

{% block title %}My Profile - {{ club_name }}{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-7 col-lg-6">
            <div class="card shadow border-0">
                <div class="card-header bg-primary text-white">
                    <h5 class="mb-0"><i class="bi bi-person-circle me-2"></i>My Profile</h5>
                </div>
                <div class="card-body p-4">
                    <form method="POST" action="{{ url_for('auth.profile') }}">
                        <div class="row mb-3">
                            <div class="col-sm-4">
                                <label class="form-label text-muted small">Username</label>
                                <input type="text" class="form-control" value="{{ current_user.username }}" disabled>
                            </div>
                            <div class="col-sm-8">
                                <label class="form-label text-muted small">Role</label>
                                <input type="text" class="form-control" value="{{ current_user.role.value | replace('_', ' ') | title }}" disabled>
                            </div>
                        </div>

                        <hr>

                        <div class="mb-3">
                            <label for="full_name" class="form-label">Full Name</label>
                            <input type="text" class="form-control" id="full_name" name="full_name" value="{{ current_user.full_name }}" required>
                        </div>

                        <div class="mb-3">
                            <label for="email" class="form-label">Email</label>
                            <input type="email" class="form-control" id="email" name="email" value="{{ current_user.email }}" required>
                        </div>

                        <div class="mb-3">
                            <label for="phone" class="form-label">Phone</label>
                            <input type="text" class="form-control" id="phone" name="phone" value="{{ current_user.phone or '' }}">
                        </div>

                        <hr>
                        <h6 class="fw-bold mb-3">Change Password</h6>
                        <p class="text-muted small">Leave blank to keep current password.</p>

                        <div class="mb-3">
                            <label for="current_password" class="form-label">Current Password</label>
                            <input type="password" class="form-control" id="current_password" name="current_password">
                        </div>

                        <div class="mb-3">
                            <label for="new_password" class="form-label">New Password</label>
                            <input type="password" class="form-control" id="new_password" name="new_password" minlength="6">
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary">Update Profile</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
